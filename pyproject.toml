[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mimir"
version = "0.1.0"
description = "Meeting assistant with a Python backend and React frontend"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Mimir contributors" }]

[project.scripts]
mimir = "mimir.server:main"

[tool.setuptools.packages.find]
include = ["mimir*"]
